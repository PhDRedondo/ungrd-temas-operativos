# UNGRD Temas Operativos — stack local 100% open source
# Postgres (app) + Keycloak (OIDC) + Postgres (Keycloak)

services:
  postgres:
    image: postgres:16-alpine
    container_name: ungrd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ungrd
      POSTGRES_PASSWORD: ungrd
      POSTGRES_DB: ungrd_temas
    volumes:
      - ungrd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ungrd -d ungrd_temas"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    container_name: ungrd-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - ungrd_kc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: ungrd-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-ungrd.json:/opt/keycloak/data/import/realm-ungrd.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  ungrd_pg_data:
  ungrd_kc_data:
